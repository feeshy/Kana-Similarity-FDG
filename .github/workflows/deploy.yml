name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Prepare files
        run: |
          rm -f README.md LICENSE* assets/*LICENSE* assets/*OFL*

      - name: Generate sitemap.xml
        run: |
          BUILD_DATE=$(date -u +"%Y-%m-%d")
          cat <<EOF > sitemap.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9"
                  xmlns:xhtml="http://www.w3.org/1999/xhtml">
            <url>
              <loc>https://kana.feeshy.top/</loc>
              <lastmod>${BUILD_DATE}</lastmod>
              <xhtml:link rel="alternate" hreflang="en" href="https://kana.feeshy.top/"/>
              <xhtml:link rel="alternate" hreflang="ja" href="https://kana.feeshy.top/ja"/>
              <xhtml:link rel="alternate" hreflang="zh" href="https://kana.feeshy.top/zh"/>
              <xhtml:link rel="alternate" hreflang="x-default" href="https://kana.feeshy.top/"/>
            </url>
            <url>
              <loc>https://kana.feeshy.top/ja</loc>
              <lastmod>${BUILD_DATE}</lastmod>
              <xhtml:link rel="alternate" hreflang="en" href="https://kana.feeshy.top/"/>
              <xhtml:link rel="alternate" hreflang="ja" href="https://kana.feeshy.top/ja"/>
              <xhtml:link rel="alternate" hreflang="zh" href="https://kana.feeshy.top/zh"/>
              <xhtml:link rel="alternate" hreflang="x-default" href="https://kana.feeshy.top/"/>
            </url>
            <url>
              <loc>https://kana.feeshy.top/zh</loc>
              <lastmod>${BUILD_DATE}</lastmod>
              <xhtml:link rel="alternate" hreflang="en" href="https://kana.feeshy.top/"/>
              <xhtml:link rel="alternate" hreflang="ja" href="https://kana.feeshy.top/ja"/>
              <xhtml:link rel="alternate" hreflang="zh" href="https://kana.feeshy.top/zh"/>
              <xhtml:link rel="alternate" hreflang="x-default" href="https://kana.feeshy.top/"/>
            </url>
          </urlset>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
