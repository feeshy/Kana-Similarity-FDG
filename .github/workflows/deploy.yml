name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Prepare files
        run: |
          rm -f README.md LICENSE* assets/*LICENSE* assets/*OFL*

      - name: Generate IndexNow Key File
        run: echo "${{ secrets.BING_INDEXNOW_KEY }}" > ${{ secrets.BING_INDEXNOW_KEY }}.txt

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download last successful SHA
        uses: dawidd6/action-download-artifact@v21
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: deploy.yml
          name: last_indexnow_sha
          path: last_indexnow_sha_artifact
          if_no_artifact_found: warn

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Submit Changed URLs to IndexNow
        run: |
          LAST_SHA="HEAD~1"
          if [ -f last_indexnow_sha_artifact/last_indexnow_sha ]; then
            CANDIDATE=$(cat last_indexnow_sha_artifact/last_indexnow_sha)
            if git cat-file -e "$CANDIDATE^{commit}" 2>/dev/null; then
              LAST_SHA="$CANDIDATE"
              echo "Using last successful SHA as diff base: $LAST_SHA"
            else
              echo "Stored SHA $CANDIDATE not in current history, falling back to HEAD~1"
            fi
          else
            echo "No prior SHA found, falling back to HEAD~1"
          fi

          CHANGED_NAMES=$(git diff --name-only --diff-filter=ACMRT "$LAST_SHA" HEAD | grep -E '\.(md|markdown|html)$' | sed -E 's#.*/##' | sed -E 's#^[0-9]{4}-[0-9]{2}-[0-9]{2}-##' | sed -E 's#\.(md|markdown|html)$##' || true)

          if [ -z "$CHANGED_NAMES" ]; then
            echo "No relevant article or page changes detected. Skipping IndexNow submission safely."
            exit 0
          fi

          echo "Fetching sitemap to resolve custom permalinks..."
          curl -s https://kana.feeshy.top/sitemap.xml > remote_sitemap.xml

          MATCHED_URLS=""
          for name in $CHANGED_NAMES; do
            FOUND_URL=$(grep -ioE "<loc>[^<]*$name[^<]*</loc>" remote_sitemap.xml | sed -E 's|</?loc>||gi' | head -n 1 || true)
            if [ ! -z "$FOUND_URL" ]; then
              MATCHED_URLS="$MATCHED_URLS\"$FOUND_URL\","
            fi
          done

          URL_LIST_JSON=$(echo "$MATCHED_URLS" | sed 's/,$//')

          if [ -z "$URL_LIST_JSON" ]; then
            echo "Articles changed but URLs not found in sitemap. Fallback to sitemap link."
            URL_LIST_JSON='"https://kana.feeshy.top/sitemap.xml"'
          fi

          echo "Submitting URLs: [$URL_LIST_JSON]"

          HTTP_CODE=$(curl -sS -o indexnow_response.txt -w "%{http_code}" \
            -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "{
              \"host\": \"kana.feeshy.top\",
              \"key\": \"${{ secrets.BING_INDEXNOW_KEY }}\",
              \"keyLocation\": \"https://kana.feeshy.top/${{ secrets.BING_INDEXNOW_KEY }}.txt\",
              \"urlList\": [$URL_LIST_JSON]
            }")
          echo "IndexNow HTTP $HTTP_CODE"
          cat indexnow_response.txt || true

          INDEXNOW_FAILED=0
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "202" ]; then
            echo "::warning::IndexNow submission failed (HTTP $HTTP_CODE); site deployed but search engines were not notified. Will retry on next deploy."
            INDEXNOW_FAILED=1
          fi

          if [ "$INDEXNOW_FAILED" = "0" ]; then
            git rev-parse HEAD > last_indexnow_sha
          fi
        shell: bash

      - name: Persist SHA artifact
        if: success()
        uses: actions/upload-artifact@v7
        with:
          name: last_indexnow_sha
          path: last_indexnow_sha
          if-no-files-found: warn
          retention-days: 90
